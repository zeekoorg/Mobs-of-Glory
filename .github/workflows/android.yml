name: Manual Mobs Of Glory Builder

on:
  workflow_dispatch: # تشغيل يدوياً فقط

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # الخطوة السحرية: إذا كان ملف gradlew مفقوداً، قم بتوليده الآن
    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mobs-Of-Glory-Build
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 1

    # تنظيف الأرشيف القديم لضمان عدم امتلاء المساحة
    - name: Cleanup Old Artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          for (const artifact of artifacts.data.artifacts) {
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
          }
