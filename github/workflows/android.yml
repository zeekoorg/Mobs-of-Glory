name: Manual Mobs Of Glory Builder

# هنا السر: قمت بإلغاء "push" ووضعت "workflow_dispatch" فقط
on:
  workflow_dispatch: # هذا الأمر يجعل البناء يدوياً فقط عبر زر في غيت هوب

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # بناء نسخة Debug (أسرع وأسهل للتثبيت اليدوي على الهواتف)
    - name: Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mobs-Of-Glory-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 1 # سيحذف الملف بعد يوم واحد لتوفير مساحتك

    # تنظيف تلقائي للمخلفات القديمة لضمان عدم امتلاء مساحة المستودع
    - name: Cleanup Old Builds
      uses: actions/github-script@v6
      with:
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          for (const artifact of artifacts.data.artifacts) {
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
          }
